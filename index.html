<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A custom falling sand sandbox rebuilt as a lightweight JavaScript simulation."
    />
    <title>Cody Hsieh Sand Lab</title>
    <style>
      #loading-overlay {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 18%, rgba(255, 255, 250, 0.96), transparent 34%),
          linear-gradient(180deg, #fffdf8 0%, #faf4eb 54%, #ede6db 100%);
        color: #2e2a24;
        font: 11px "Courier New", monospace;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        transition: opacity 220ms ease, visibility 220ms ease;
      }

      #loading-overlay.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .loader-mark {
        display: grid;
        gap: 16px;
        justify-items: center;
      }

      .loader-orbit {
        position: relative;
        width: 64px;
        height: 64px;
        border: 1px solid rgba(46, 42, 36, 0.16);
        border-radius: 50%;
        animation: loader-spin 1.2s linear infinite;
      }

      .loader-orbit::before,
      .loader-orbit::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        background: #2e2a24;
      }

      .loader-orbit::before {
        top: -4px;
        left: 28px;
        width: 8px;
        height: 8px;
      }

      .loader-orbit::after {
        right: 5px;
        bottom: 9px;
        width: 5px;
        height: 5px;
        opacity: 0.45;
      }

      @keyframes loader-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <script defer src="/app.js"></script>
  </head>
  <body>
    <div id="loading-overlay" role="status" aria-live="polite">
      <div class="loader-mark">
        <div class="loader-orbit" aria-hidden="true"></div>
        <div>Loading elements</div>
      </div>
    </div>
    <div id="app-shell">
      <main id="playfield">
        <div class="canvas-frame">
          <canvas id="sand-canvas"></canvas>
          <canvas id="hud-canvas"></canvas>
        </div>
      </main>
    </div>
  </body>
</html>
